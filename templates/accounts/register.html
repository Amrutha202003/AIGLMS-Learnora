{% extends "base.html" %}
{% load static %}
{% block title %}Register - Learnora{% endblock %}
{% block content %}
<style>
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; font-family: 'Segoe UI', sans-serif; padding: 2rem;
  }
  .register-container {
    background: rgba(255,255,255,0.95); border-radius: 20px;
    padding: 2.5rem; max-width: 480px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .register-header { text-align:center; margin-bottom:1.8rem; }
  .register-header h2 { color:#667eea; font-size:1.9rem; font-weight:700; margin-bottom:0.3rem; }
  .register-header p  { color:#666; font-size:0.95rem; }
  .form-group { margin-bottom:1.2rem; }
  .form-label { display:block; color:#333; font-weight:600; margin-bottom:0.4rem; font-size:0.95rem; }
  .form-control {
    width:100%; padding:0.75rem 1rem; border:2px solid #e0e0e0;
    border-radius:10px; font-size:1rem; transition:all 0.3s; box-sizing:border-box;
  }
  .form-control:focus { outline:none; border-color:#667eea; box-shadow:0 0 0 3px rgba(102,126,234,0.1); }
  .password-wrapper { position:relative; }
  .password-toggle {
    position:absolute; right:1rem; top:50%; transform:translateY(-50%);
    background:none; border:none; color:#666; cursor:pointer; font-size:1.1rem;
  }
  .btn-register {
    width:100%; padding:0.9rem;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    color:#fff; border:none; border-radius:50px; font-size:1.05rem;
    font-weight:600; cursor:pointer; transition:transform 0.2s; margin-top:0.5rem;
  }
  .btn-register:hover    { transform:translateY(-2px); box-shadow:0 5px 20px rgba(102,126,234,0.4); }
  .btn-register:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
  .alert { padding:0.85rem 1rem; border-radius:10px; margin-bottom:1rem; display:none; font-size:0.9rem; }
  .alert.show    { display:block; }
  .alert-danger  { background:#fee; color:#c33; border:1px solid #fcc; }
  .alert-success { background:#efe; color:#383; border:1px solid #cfc; }
  .login-link { text-align:center; margin-top:1.2rem; color:#666; font-size:0.9rem; }
  .login-link a { color:#667eea; text-decoration:none; font-weight:600; }
  .spinner {
    display:inline-block; width:16px; height:16px;
    border:2px solid rgba(255,255,255,0.4); border-top-color:#fff;
    border-radius:50%; animation:spin 0.8s linear infinite;
    vertical-align:middle; margin-right:6px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { display:none; }
  .btn-register.loading .normal-text  { display:none; }
  .btn-register.loading .loading-text { display:inline; }
</style>

<div class="register-container">
  <div class="register-header">
    <h2>🎓 Join Learnora</h2>
    <p>Create your account and start learning!</p>
  </div>
  <div id="alertError"   class="alert alert-danger" ><span id="errorText"></span></div>
  <div id="alertSuccess" class="alert alert-success"><span id="successText"></span></div>

  <form id="registerForm">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" id="fullName" class="form-control"
             placeholder="Enter your full name" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">Username <span style="color:#e33">*</span></label>
      <input type="text" id="username" class="form-control"
             placeholder="Choose a username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Email Address <span style="color:#e33">*</span></label>
      <input type="email" id="email" class="form-control"
             placeholder="Enter your email" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <input type="tel" id="phone" class="form-control"
             placeholder="Enter your phone number" autocomplete="tel">
    </div>
    <div class="form-group">
      <label class="form-label">Password <span style="color:#e33">*</span></label>
      <div class="password-wrapper">
        <input type="password" id="password" class="form-control"
               placeholder="Min 8 characters" required autocomplete="new-password">
        <button type="button" class="password-toggle" id="togglePwd1"><i class="bi bi-eye"></i></button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password <span style="color:#e33">*</span></label>
      <div class="password-wrapper">
        <input type="password" id="passwordConfirm" class="form-control"
               placeholder="Re-enter your password" required autocomplete="new-password">
        <button type="button" class="password-toggle" id="togglePwd2"><i class="bi bi-eye"></i></button>
      </div>
    </div>
    <button type="submit" class="btn-register" id="registerBtn">
      <span class="normal-text">Create Account</span>
      <span class="loading-text"><span class="spinner"></span> Creating account...</span>
    </button>
  </form>
  <div class="login-link">
    Already have an account? <a href="/login/">Login here</a>
  </div>
</div>

<script>
// FIX: on register page, NEVER redirect even if token exists.
// User may want to create a second account, or the token may be someone else's.
// We only redirect if they explicitly came here already logged in AND confirm.
window.addEventListener('DOMContentLoaded', function () {
  // Do NOT auto-redirect on register page — let the user register freely
});

function setupToggle(btnId, inputId) {
  document.getElementById(btnId).addEventListener('click', function () {
    var inp = document.getElementById(inputId);
    var icon = this.querySelector('i');
    if (inp.type === 'password') { inp.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { inp.type = 'password'; icon.className = 'bi bi-eye'; }
  });
}
setupToggle('togglePwd1', 'password');
setupToggle('togglePwd2', 'passwordConfirm');

document.getElementById('registerForm').addEventListener('submit', async function (e) {
  e.preventDefault();
  hideMessages();

  var username        = document.getElementById('username').value.trim();
  var email           = document.getElementById('email').value.trim();
  var phone           = document.getElementById('phone').value.trim();
  var fullName        = document.getElementById('fullName').value.trim();
  var password        = document.getElementById('password').value;
  var passwordConfirm = document.getElementById('passwordConfirm').value;

  if (!username)           { showError('Username is required.'); return; }
  if (!email)              { showError('Email is required.'); return; }
  if (!password)           { showError('Password is required.'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (password !== passwordConfirm) { showError('Passwords do not match.'); return; }

  var btn = document.getElementById('registerBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    var res = await fetch('/api/auth/register/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username:         username,
        email:            email,
        phone_number:     phone,
        full_name:        fullName,
        password:         password,
        password_confirm: passwordConfirm,
      })
    });
    var data = await res.json();

    if (res.ok) {
      // FIX: clear any old token from a previous session so the
      // new user isn't accidentally auto-logged in as someone else
      localStorage.clear();

      showSuccess('Account created! Redirecting to login...');
      setTimeout(function () {
        window.location.href = '/login/?registered=1';
      }, 1500);
    } else {
      showError(data.error || data.detail || data.message || 'Registration failed.');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  } catch (err) {
    console.error(err);
    showError('Connection failed. Make sure Django is running.');
    btn.classList.remove('loading');
    btn.disabled = false;
  }
});

function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('alertError').classList.add('show');
  document.getElementById('alertSuccess').classList.remove('show');
}
function showSuccess(msg) {
  document.getElementById('successText').textContent = msg;
  document.getElementById('alertSuccess').classList.add('show');
  document.getElementById('alertError').classList.remove('show');
}
function hideMessages() {
  document.getElementById('alertError').classList.remove('show');
  document.getElementById('alertSuccess').classList.remove('show');
}
</script>
{% endblock %}
